server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dianping?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
  redis:
    host: 192.168.145.128
    port: 6379
    password: 123456
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: dianping
      auto-offset-reset: earliest
    producer:
      retries: 3
      acks: all

app:
  recommendation:
    cache-ttl-seconds: 300
  jwt:
    secret: DianpingJwtSecretKey-ChangeMe-2026
    expire-minutes: 120

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
