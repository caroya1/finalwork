server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dianping?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  redis:
    host: 192.168.145.128
    port: 6379
    password: 123456
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: dianping
      auto-offset-reset: earliest
    producer:
      retries: 3
      acks: all

app:
  recommendation:
    cache-ttl-seconds: 300
