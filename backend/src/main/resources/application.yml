server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dianping?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowMultiQueries=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET NAMES utf8mb4
  sql:
    init:
      mode: always
      encoding: UTF-8

  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  redis:
    host: 192.168.145.128
    port: 6379
    password: 123456
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: dianping
      auto-offset-reset: earliest
    producer:
      retries: 3
      acks: all

app:
  recommendation:
    cache-ttl-seconds: 300
  jwt:
    secret: DianpingJwtSecretKey-ChangeMe-2026
    expire-minutes: 120
    refresh-expire-days: 7

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
