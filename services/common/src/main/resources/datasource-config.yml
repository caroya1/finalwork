# 数据库连接池配置（HikariCP优化）

spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dianping?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:123456}
    
    hikari:
      # 连接池名称
      pool-name: DianPingHikariPool
      
      # 最小空闲连接数
      minimum-idle: 10
      
      # 最大连接数（根据服务器配置调整）
      maximum-pool-size: 50
      
      # 连接空闲超时时间（毫秒）
      idle-timeout: 600000
      
      # 连接最大存活时间（毫秒）
      max-lifetime: 1800000
      
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      
      # 测试连接的SQL
      connection-test-query: SELECT 1
      
      # 自动提交
      auto-commit: true
      
      # 连接初始化SQL
      connection-init-sql: SET NAMES utf8mb4
      
      # 验证连接的超时时间
      validation-timeout: 5000
      
      # 泄漏检测阈值（毫秒）
      leak-detection-threshold: 60000
      
      # 数据源属性
      data-source-properties:
        # 缓存预编译语句
        cachePrepStmts: true
        # 预编译语句缓存大小
        prepStmtCacheSize: 300
        # 预编译语句缓存SQL长度限制
        prepStmtCacheSqlLimit: 2048
        # 使用服务器端预编译语句
        useServerPrepStmts: true
        # 设置时区
        serverTimezone: Asia/Shanghai

---
# 读写分离配置（主从模式）
spring:
  config:
    activate:
      on-profile: master-slave
  
  datasource:
    master:
      jdbc-url: jdbc:mysql://master-host:3306/dianping?useUnicode=true&characterEncoding=utf-8
      username: root
      password: ${MYSQL_MASTER_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
    
    slave:
      jdbc-url: jdbc:mysql://slave-host:3306/dianping?useUnicode=true&characterEncoding=utf-8
      username: root
      password: ${MYSQL_SLAVE_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver

---
# Redis连接池配置
spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      
      lettuce:
        pool:
          # 最大活跃连接数
          max-active: 50
          # 最大空闲连接数
          max-idle: 20
          # 最小空闲连接数
          min-idle: 5
          # 最大等待时间（毫秒）
          max-wait: 3000ms
          # 连接池耗尽时是否阻塞
          time-between-eviction-runs: 60000ms

---
# MyBatis-Plus性能优化配置
mybatis-plus:
  configuration:
    # 开启驼峰命名自动映射
    map-underscore-to-camel-case: true
    # 开启SQL日志（生产环境关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 缓存启用
    cache-enabled: true
    # 懒加载启用
    lazy-loading-enabled: true
    # 积极加载禁用
    aggressive-lazy-loading: false
    # 默认执行器类型
    default-executor-type: reuse
    
  global-config:
    db-config:
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # ID类型
      id-type: auto
      # 表前缀
      table-prefix: tb_
      
  #  mapper XML文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 类型别名包
  type-aliases-package: com.dianping.*.entity
