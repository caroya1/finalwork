app:
  jwt:
    secret: DianpingJwtSecretKey-ChangeMe-2026
    
spring:
  data:
    redis:
      host: 192.168.145.128
      port: 6379
      password: 123456
      connect-timeout: 5s
      timeout: 5s
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: user-service-admin
          uri: lb://user-service
          predicates:
            - Path=/api/admin/users/**
        - id: merchant-service
          uri: lb://merchant-service
          predicates:
            - Path=/api/merchants/**
        - id: merchant-service-admin
          uri: lb://merchant-service
          predicates:
            - Path=/api/admin/merchants/**
        - id: shop-service
          uri: lb://shop-service
          predicates:
            - Path=/api/shops/**
        - id: shop-service-merchant
          uri: lb://shop-service
          predicates:
            - Path=/api/merchant/shops/**
        - id: shop-service-admin
          uri: lb://shop-service
          predicates:
            - Path=/api/admin/shops/**
        - id: coupon-service
          uri: lb://coupon-service
          predicates:
            - Path=/api/coupons/**
        - id: coupon-service-merchant
          uri: lb://coupon-service
          predicates:
            - Path=/api/merchant/coupons/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
        - id: order-service-admin
          uri: lb://order-service
          predicates:
            - Path=/api/admin/orders/**
        - id: post-service
          uri: lb://post-service
          predicates:
            - Path=/api/posts/**
        - id: post-service-admin
          uri: lb://post-service
          predicates:
            - Path=/api/admin/posts/**
        - id: recommendation-service
          uri: lb://recommendation-service
          predicates:
            - Path=/api/recommendations/**
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
        - id: post-service-oss
          uri: lb://post-service
          predicates:
            - Path=/api/oss/**
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://localhost:5175"
              - "http://127.0.0.1:5173"
              - "http://127.0.0.1:5174"
              - "http://127.0.0.1:5175"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Authorization
              - X-Refresh-Token
            allowCredentials: true
            maxAge: 3600
