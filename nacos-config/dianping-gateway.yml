spring:
  cloud:
    gateway:
      routes:
        - id: dianping-backend
          uri: lb://dianping-backend
          predicates:
            - Path=/api/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://localhost:5175"
              - "http://127.0.0.1:5173"
              - "http://127.0.0.1:5174"
              - "http://127.0.0.1:5175"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Authorization
              - X-Refresh-Token
            allowCredentials: true
            maxAge: 3600
