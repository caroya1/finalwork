spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: merchant-service
          uri: lb://merchant-service
          predicates:
            - Path=/api/merchants/**
        - id: shop-service
          uri: lb://shop-service
          predicates:
            - Path=/api/shops/**
        - id: coupon-service
          uri: lb://coupon-service
          predicates:
            - Path=/api/coupons/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
        - id: post-service
          uri: lb://post-service
          predicates:
            - Path=/api/posts/**
        - id: recommendation-service
          uri: lb://recommendation-service
          predicates:
            - Path=/api/recommendations/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://localhost:5175"
              - "http://127.0.0.1:5173"
              - "http://127.0.0.1:5174"
              - "http://127.0.0.1:5175"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Authorization
              - X-Refresh-Token
            allowCredentials: true
            maxAge: 3600
