# 敏感信息配置文件
# 本文件包含所有服务的敏感配置（API Key、密码等）
# 使用说明：
# 1. 复制本文件为 secrets.yml
# 2. 填入真实的敏感信息
# 3. 确保 secrets.yml 已被 .gitignore 忽略

# ============================================
# AI 服务配置 (ai-service)
# ============================================
ai:
  dashscope:
    api-key: sk-your-actual-api-key-here  # 通义千问 API Key

# ============================================
# 腾讯云 COS 配置 (post-service)
# ============================================
app:
  oss:
    tencent:
      secret-id: AKID-your-secret-id-here      # 腾讯云 Secret ID
      secret-key: your-secret-key-here          # 腾讯云 Secret Key
      bucket-name: your-bucket-name             # COS 存储桶名称

# ============================================
# 数据库配置 (所有服务)
# ============================================
spring:
  datasource:
    password: your-mysql-password-here          # MySQL 数据库密码
  data:
    redis:
      password: your-redis-password-here        # Redis 密码
