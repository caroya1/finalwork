server:
  port: 8097
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dianping_post?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowMultiQueries=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET NAMES utf8mb4
  data:
    redis:
      host: 192.168.145.128
      port: 6379
      password: 123456

app:
  post:
    cache-ttl-seconds: 300
  oss:
    tencent:
      secret-id: ${TENCENT_SECRET_ID:your-secret-id-here}
      secret-key: ${TENCENT_SECRET_KEY:your-secret-key-here}
      bucket-name: ${TENCENT_BUCKET:your-bucket-name}
      region: ${TENCENT_REGION:ap-guangzhou}
      max-size: 10485760
      allowed-types: image/jpeg,image/png,image/gif,image/webp

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
