input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # 解析时间戳
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
  
  # 根据类型路由
  if [logger_name] == "AUDIT_LOGGER" or [type] == "audit_log" {
    mutate {
      add_field => { "index_prefix" => "audit" }
      add_field => { "log_type" => "audit" }
    }
  } else if [level] == "ERROR" {
    mutate {
      add_field => { "index_prefix" => "error" }
      add_field => { "log_type" => "error" }
    }
  } else {
    mutate {
      add_field => { "index_prefix" => "application" }
      add_field => { "log_type" => "application" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{index_prefix}-logs-%{+YYYY.MM.dd}"
  }
  
  # 调试输出（开发环境可启用）
  # stdout { codec => rubydebug }
}
